<div id="myCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
        {% for slide in carousel_slides %}
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="{{ loop.index0 }}" aria-label="Slide {{ loop.index }}"{% if loop.first %} class="active" aria-current="true"{% endif %}></button>
        {% endfor %}
    </div>
    <div class="carousel-inner">
        {% for slide in carousel_slides %}
        <div class="carousel-item{% if loop.first %} active{% endif %}" style="background-image: url('/static/img/{{ slide.image }}')">
            <div class="container">
                <div class="carousel-caption">
                    <h1>{{ slide.title }}</h1>
                    <p>...</p>
                    <p><a class="btn btn-lg btn-call" href="/categoria/{{ slide.link }}">Ver más</a></p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
    </button>
</div>
