<section id="categorias">
    <div class="container">
        <div class="listadoCategorias">
            {% for cat in categories %}
            <a href="/categoria/{{ cat.slug }}" class="cuadrada">
                <p>{{ cat.name }}</p>
                <img src="/static/img/{{ cat.image }}" alt="{{ cat.name }}" class="centrar imagenCategoria">
            </a>
            {% endfor %}
            <span class="clearfix"></span>
        </div>
    </div>
</section>
