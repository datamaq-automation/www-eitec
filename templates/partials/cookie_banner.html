<div id="cookie-banner" class="cookie-banner d-none">

            <div class="cookie-banner__text d-flex align-items-center gap-2">
                <i class="fa-solid fa-cookie-bite text-primary fs-3"></i>
                <p class="mb-0 text-secondary" style="font-size: 0.9rem; line-height: 1.4;">
                    Utilizamos cookies de terceros (Google Analytics y Microsoft Clarity) para recopilar estadísticas anónimas de navegación y optimizar el rendimiento de nuestro catálogo. Al hacer clic en "Aceptar", prestás tu consentimiento para habilitar estas herramientas.
                </p>
            </div>
            <div class="cookie-banner__actions d-flex align-items-center gap-2 flex-wrap">
                <button id="btn-accept-cookies" class="btn btn-primary btn-call btn-call--secondary cookie-banner__btn py-2">Aceptar</button>
                <button id="btn-reject-cookies" class="btn btn-outline-secondary cookie-banner__btn py-2">Rechazar</button>
                <a href="/politica-de-privacidad" class="cookie-banner__link text-decoration-none text-muted ms-2" style="font-size: 0.8rem;">Leer más</a>
            </div>
        </div>
    </div>
</div>
