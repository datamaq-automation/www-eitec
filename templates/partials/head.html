<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&family=Varela+Round&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link href="https://default.contactopuro.com/inc/css/hamburgers.min.css" rel="stylesheet" type="text/css">
<link href="https://default.contactopuro.com/inc/css/styles.min.css" rel="stylesheet" type="text/css">

<link href="/static/css/main.css?v={{ static_version }}" rel="stylesheet" type="text/css">

<script>
    window.EITEC_GA_ID = "{{ google_analytics_id | default('') }}";
    window.EITEC_CLARITY_ID = "{{ microsoft_clarity_id | default('') }}";
</script>

<!-- Prefetching & Preconnecting CDNs for Performance -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://default.contactopuro.com">

<!-- Robots Optimization -->
{% if noindex %}
<meta name="robots" content="noindex, nofollow">
{% else %}
<meta name="robots" content="index, follow">
{% endif %}

<!-- Canonical & Lang Tags -->
<link rel="canonical" href="{{ canonical_url | default('https://www.eitec.coop.ar/') }}">
<link rel="alternate" hreflang="es-AR" href="{{ canonical_url | default('https://www.eitec.coop.ar/') }}">

<!-- Primary Meta Tags -->
<title>{{ title | default('EITEC - Fábrica de accesorios para Artefactos a Gas') }}</title>
<meta name="title" content="{{ title | default('EITEC - Fábrica de accesorios para Artefactos a Gas') }}">
<meta name="description" content="{{ description | default('Fabricación de accesorios y repuestos para artefactos a gas en Bernal, Argentina. Válvulas de seguridad, termostatos y quemadores de la línea ex EITAR.') }}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ canonical_url | default('https://www.eitec.coop.ar/') }}">
<meta property="og:title" content="{{ title | default('EITEC - Fábrica de accesorios para Artefactos a Gas') }}">
<meta property="og:description" content="{{ description | default('Fabricación de accesorios y repuestos para artefactos a gas en Bernal, Argentina. Válvulas de seguridad, termostatos y quemadores de la línea ex EITAR.') }}">
<meta property="og:image" content="{% if active_category %}https://www.eitec.coop.ar/static/img/{{ active_category.image }}{% else %}https://www.eitec.coop.ar/static/custom/logo.png{% endif %}">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="{{ canonical_url | default('https://www.eitec.coop.ar/') }}">
<meta name="twitter:title" content="{{ title | default('EITEC - Fábrica de accesorios para Artefactos a Gas') }}">
<meta name="twitter:description" content="{{ description | default('Fabricación de accesorios y repuestos para artefactos a gas en Bernal, Argentina. Válvulas de seguridad, termostatos y quemadores de la línea ex EITAR.') }}">
<meta name="twitter:image" content="{% if active_category %}https://www.eitec.coop.ar/static/img/{{ active_category.image }}{% else %}https://www.eitec.coop.ar/static/custom/logo.png{% endif %}">

<!-- Favicon -->
<link rel="icon" type="image/png" href="/custom/logo.png?v={{ static_version }}">
<link rel="shortcut icon" href="/favicon.ico?v={{ static_version }}">
<link rel="apple-touch-icon" href="/custom/logo.png?v={{ static_version }}">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="theme-color" content="#ffffff">
