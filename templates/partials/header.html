<header class="header" id="header">
    <div class="header__top top">
        <div class="container">
            <div class="header__socials redes">
                <a href="{{ site_info.social_instagram }}" class="icon icon-instagram" target="_blank"></a>
                <a href="mailto:{{ site_info.contact_email }}" class="icon icon-mail"></a>
                <a href="{{ site_info.social_facebook }}" class="icon icon-facebook" target="_blank"></a>
            </div>
            <p>{{ site_info.subtitle }}</p>
            <div class="header__actions optIcons">
                <a href="javascript:void(0);" class="icon fa-solid fa-magnifying-glass buscar"></a>
                <a href="/carrito" class="icon fa-solid fa-cart-shopping position-relative">
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.55rem; padding: 0.25em 0.4em;">0</span>
                </a>
            </div>
            <span class="clearfix"></span>
        </div>
    </div>

    <div class="container">
        <a href="/" class="header__logo logo"></a>

        <button class="header__hamburger hamburger hamburger--collapse" type="button" aria-label="Abrir menú de navegación" aria-expanded="false" aria-controls="navigation-menu">
            <span class="hamburger-box">
                <span class="header__hamburger-inner hamburger-inner"></span>
            </span>
        </button>

        <nav class="header__nav" id="navigation-menu">
            <ul class="header__menu options">
                <li class="header__menu-item">
                    <a href="/" class="header__menu-link">Inicio</a>
                </li>
                {% for cat in categories %}
                <li class="header__menu-item">
                    <p class="header__menu-trigger trigger mb-0"><a href="/categoria/{{ cat.slug }}" class="header__menu-link">{{ cat.name }}</a></p>
                </li>
                {% endfor %}
            </ul>
        </nav>

        <div class="header__mask mask"></div>
        <span class="clearfix"></span>
    </div>
</header>
