<header class="header" id="header">
    <div class="header__top top">
        <div class="container">
            <div class="header__socials redes">
                <a href="{{ site_info.social_instagram }}" class="icon icon-instagram" target="_blank" rel="noopener noreferrer" aria-label="Seguinos en Instagram"></a>
                <a href="/contactanos" class="icon icon-mail" aria-label="Enviar un correo electrónico a la cooperativa"></a>
                <a href="{{ site_info.social_facebook }}" class="icon icon-facebook" target="_blank" rel="noopener noreferrer" aria-label="Seguinos en Facebook"></a>
            </div>
            <p>{{ site_info.subtitle }}</p>
            <div class="header__actions optIcons">
                <a href="javascript:void(0);" class="icon fa-solid fa-magnifying-glass buscar" aria-label="Buscar categorías"></a>
            </div>
            <span class="clearfix"></span>
        </div>
    </div>

    <div class="container">
        <a href="/" class="header__logo logo" aria-label="EITEC Cooperativa - Volver a la página de inicio"></a>

        <button class="header__hamburger hamburger hamburger--collapse" type="button" aria-label="Abrir menú de navegación" aria-expanded="false" aria-controls="navigation-menu">
            <span class="hamburger-box">
                <span class="header__hamburger-inner hamburger-inner"></span>
            </span>
        </button>

        <nav class="header__nav" id="navigation-menu">
            <ul class="header__menu options">
                <li class="header__menu-item">
                    <a href="/" class="header__menu-link">Inicio</a>
                </li>
                {% for cat in categories %}
                <li class="header__menu-item">
                    <p class="header__menu-trigger trigger mb-0"><a href="/categoria/{{ cat.slug }}" class="header__menu-link">{{ cat.name }}</a></p>
                </li>
                {% endfor %}
            </ul>
        </nav>

        <div class="header__mask mask"></div>
        <span class="clearfix"></span>
    </div>
</header>
