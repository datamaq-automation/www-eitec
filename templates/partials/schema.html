{# Schema.org Structured Data using JSON-LD #}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "{{ base_url }}/#organization",
      "name": "EITEC Cooperativa de Trabajo",
      "alternateName": "EITAR",
      "url": "{{ base_url }}/",
      "logo": {
        "@type": "ImageObject",
        "@id": "{{ base_url }}/#logo",
        "url": "{{ base_url }}/static/custom/logo.png",
        "caption": "EITEC Cooperativa ex EITAR Logo"
      },
      "image": {
        "@id": "{{ base_url }}/#logo"
      },
      "description": "Fábrica cooperativa metalúrgica continuadora de EITAR, dedicada a la fabricación de accesorios y repuestos para artefactos a gas en Bernal, Argentina.",
      "email": "{{ site_info.contact_email }}",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "telephone": "+{{ site_info.contact_whatsapp }}",
          "contactType": "customer service",
          "areaServed": "AR",
          "availableLanguage": ["Spanish"]
        }
      ],
      "sameAs": [
        "https://www.instagram.com/eitec_cooperativa/",
        "https://www.facebook.com/CooperativaEitec"
      ]
    },
    {
      "@type": "LocalBusiness",
      "@id": "{{ base_url }}/#localbusiness",
      "name": "EITEC Cooperativa Metalúrgica",
      "parentOrganization": {
        "@id": "{{ base_url }}/#organization"
      },
      "image": "{{ base_url }}/static/custom/logo.png",
      "priceRange": "$$",
      "telephone": "+541142707341",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Calle 189 Nº 950",
        "addressLocality": "Bernal Oeste, Quilmes",
        "addressRegion": "Provincia de Buenos Aires",
        "postalCode": "1876",
        "addressCountry": "AR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "-34.721200",
        "longitude": "-58.309400"
      },
      "url": "{{ base_url }}/"
    },
    {
      "@type": "WebSite",
      "@id": "{{ base_url }}/#website",
      "url": "{{ base_url }}/",
      "name": "EITEC - Accesorios y Repuestos para Artefactos a Gas",
      "publisher": {
        "@id": "{{ base_url }}/#organization"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "{{ base_url }}/buscar?s={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    {% if active_category %}
    ,
    {
      "@type": "BreadcrumbList",
      "@id": "{{ canonical_url }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Inicio",
          "item": "{{ base_url }}/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ active_category.name }}",
          "item": "{{ canonical_url }}"
        }
      ]
    },
    {
      "@type": "Product",
      "@id": "{{ canonical_url }}#product",
      "name": "{{ active_category.name }}",
      "image": "{{ base_url }}/static/img/{{ active_category.image }}",
      "description": "Fabricación y provisión de {{ active_category.name }} para artefactos a gas domésticos e industriales en Argentina por la cooperativa EITEC ex EITAR.",
      "brand": {
        "@type": "Brand",
        "name": "EITEC / EITAR"
      },
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "ARS",
        "offerCount": "1",
        "url": "{{ canonical_url }}",
        "seller": {
          "@id": "{{ base_url }}/#organization"
        }
      }
    }
    {% endif %}
  ]
}
</script>
